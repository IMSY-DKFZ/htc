name: Docker Images

on: [push, pull_request]

jobs:
  docker-image:
    name: Create Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Get version number
        run: |
          PACKAGE_VERSION=${GITHUB_REF_NAME#v}
          echo "Package version: $PACKAGE_VERSION"
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV
    
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build base image
        uses: docker/build-push-action@v6
        with:
          file: dependencies/base.Dockerfile
          tags: |
            ghcr.io/imsy-dkfz/imsy-htc-base:${{ env.PACKAGE_VERSION }}
            ghcr.io/imsy-dkfz/imsy-htc-base:latest
          push: true
          load: true
          cache-from: type=registry,ref=ghcr.io/imsy-dkfz/imsy-htc-base:buildcache
          cache-to: type=registry,ref=ghcr.io/imsy-dkfz/imsy-htc-base:buildcache,mode=max

      - name: Build main image
        uses: docker/build-push-action@v6
        with:
          file: dependencies/Dockerfile
          tags: |
            ghcr.io/imsy-dkfz/imsy-htc:${{ env.PACKAGE_VERSION }}
            ghcr.io/imsy-dkfz/imsy-htc:latest
          push: true
          cache-from: type=registry,ref=ghcr.io/imsy-dkfz/imsy-htc:buildcache
          cache-to: type=registry,ref=ghcr.io/imsy-dkfz/imsy-htc:buildcache,mode=max
